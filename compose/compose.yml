services:
  regex-app:
    build:
      context: ../apps/regex
    restart: unless-stopped
    read_only: true
    environment:
      RESULT_LIMIT: "200"
      REGEX_TIMEOUT_SECONDS: "0.05"
      MAX_PATTERN_LENGTH: "256"
      WORD_LIST_PATH: /app/data/words.txt
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/tmp
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - regex-app
    ports:
      - "8080:80"
    volumes:
      - ../infra/nginx/conf.d/regex.conf:/etc/nginx/conf.d/default.conf:ro
