limit_req_zone $binary_remote_addr zone=regex_search:10m rate=30r/m;

server {
    listen 80;
    listen [::]:80;
    server_name _;
    absolute_redirect off;
    client_max_body_size 4k;
    limit_req_status 429;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    location = / {
        return 302 /RegEx/;
    }

    location = /RegEx {
        return 302 /RegEx/;
    }

    location /RegEx/ {
        limit_req zone=regex_search burst=10 nodelay;
        proxy_pass http://regex-app:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /RegEx;
        proxy_read_timeout 30s;
    }
}
