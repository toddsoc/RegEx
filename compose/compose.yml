services:
  regex-app:
    build:
      context: ../apps/regex
    restart: unless-stopped
    environment:
      RESULT_LIMIT: "200"
      REGEX_TIMEOUT_SECONDS: "0.05"
      WORD_LIST_PATH: /app/data/words.txt
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - regex-app
    ports:
      - "8080:80"
    volumes:
      - ../infra/nginx/conf.d/regex.conf:/etc/nginx/conf.d/default.conf:ro
